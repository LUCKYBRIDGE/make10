<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>10만들기</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="게임 상태">
        <div class="brand">
          <p class="eyebrow">Make 10</p>
          <h1>10만들기</h1>
        </div>
        <div class="stats" aria-live="polite">
          <div class="stat">
            <span class="stat-label">점수</span>
            <strong id="scoreValue">0</strong>
          </div>
          <div class="stat">
            <span class="stat-label">콤보</span>
            <strong id="comboValue">0</strong>
          </div>
        </div>
        <div class="mode-switch" aria-label="화면 모드">
          <button type="button" class="mode-button" data-mode-button="mobile">모바일</button>
          <button type="button" class="mode-button" data-mode-button="tablet">태블릿</button>
          <button type="button" class="mode-button" data-mode-button="board">웹/전자칠판</button>
        </div>
        <div class="actions">
          <button type="button" id="newBoardButton" class="primary-button">새 판</button>
        </div>
      </section>

      <section class="play-surface" aria-label="흩어진 숫자 10만들기 퍼즐">
        <svg class="line-layer" id="lineLayer" aria-hidden="true">
        </svg>
        <div class="effects-layer" id="effectsLayer" aria-hidden="true"></div>
        <div class="board" id="board" aria-label="흩어진 숫자판"></div>
      </section>

      <section class="lower-panel" aria-live="polite">
        <p id="feedback" class="feedback">흩어진 숫자를 이어 10을 만드세요. 권장 1~6명 · 최대 10점 동시 입력</p>
        <div class="progress-track" aria-label="진행도">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
